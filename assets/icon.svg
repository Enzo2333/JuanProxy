<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">JuanProxy app icon</title>
  <desc id="desc">A dark rounded-square app icon with a geometric R mark and relay nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="112" y1="84" x2="900" y2="948" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="0.56" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="relay" x1="206" y1="272" x2="816" y2="744" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="relay-soft" x1="218" y1="232" x2="802" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="40" flood-color="#000814" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#bg)"/>
  <path d="M232 768H768" fill="none" stroke="#1f2f46" stroke-width="34" stroke-linecap="round"/>
  <path d="M258 756H536" fill="none" stroke="url(#relay)" stroke-width="30" stroke-linecap="round" opacity="0.9"/>

  <g filter="url(#shadow)">
    <path d="M324 744V268H546C673 268 748 332 748 436C748 510 712 562 646 588L756 744H618L522 606H448V744H324ZM448 496H532C599 496 628 470 628 436C628 400 598 376 532 376H448V496Z" fill="#e5f7ff"/>
    <path d="M448 496H532C599 496 628 470 628 436C628 400 598 376 532 376H448V496Z" fill="#0f172a" opacity="0.18"/>
  </g>

  <g filter="url(#glow)" opacity="0.95">
    <path d="M204 512H448" fill="none" stroke="url(#relay)" stroke-width="52" stroke-linecap="round"/>
    <path d="M640 512C692 512 728 484 792 420" fill="none" stroke="url(#relay)" stroke-width="52" stroke-linecap="round"/>
    <path d="M640 512C692 512 732 548 804 632" fill="none" stroke="url(#relay)" stroke-width="52" stroke-linecap="round"/>
  </g>

  <g>
    <circle cx="204" cy="512" r="72" fill="#07111f"/>
    <circle cx="204" cy="512" r="48" fill="url(#relay-soft)"/>
    <circle cx="204" cy="512" r="20" fill="#ecfeff"/>

    <circle cx="640" cy="512" r="84" fill="#07111f"/>
    <circle cx="640" cy="512" r="58" fill="url(#relay)"/>
    <circle cx="640" cy="512" r="24" fill="#f0fdfa"/>

    <circle cx="804" cy="400" r="64" fill="#07111f"/>
    <circle cx="804" cy="400" r="42" fill="url(#relay-soft)"/>
    <circle cx="804" cy="400" r="17" fill="#f0fdfa"/>

    <circle cx="816" cy="646" r="64" fill="#07111f"/>
    <circle cx="816" cy="646" r="42" fill="url(#relay-soft)"/>
    <circle cx="816" cy="646" r="17" fill="#f0fdfa"/>
  </g>

  <path d="M280 246C340 203 424 180 512 180C689 180 836 304 869 470" fill="none" stroke="#2dd4bf" stroke-width="18" stroke-linecap="round" opacity="0.16"/>
  <path d="M160 672C219 793 347 856 512 856C622 856 718 825 790 763" fill="none" stroke="#38bdf8" stroke-width="18" stroke-linecap="round" opacity="0.12"/>
</svg>
